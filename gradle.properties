# JVM arguments for Gradle (Java 17+ compatible with KSP)
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8 --add-opens=java.base/java.io=ALL-UNNAMED

# AndroidX
android.useAndroidX=true
android.enableJetifier=true

# Kotlin
kotlin.code.style=official

# 16 KB page size support for Android 15+
# Note: android.bundle.enableUncompressedNativeLibs was removed in AGP 8.1+
# The default behavior (true) is now standard for 16KB page alignment

# Disable KSP incremental processing to prevent cache flush errors
ksp.incremental=false
